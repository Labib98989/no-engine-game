name: CI

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write # needed by the release job to upload the zip on a tag

jobs:
  build:
    runs-on: windows-latest
    env:
      # Cache vcpkg's built binaries in the GitHub Actions cache so SDL3 is only
      # compiled from source once, not on every run.
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

    steps:
      - uses: actions/checkout@v4

      - name: Enable vcpkg GitHub Actions binary cache
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Configure (vcpkg + CMake)
        shell: pwsh
        run: |
          $env:VCPKG_ROOT = $env:VCPKG_INSTALLATION_ROOT
          cmake --preset msvc-x64

      - name: Build (Debug)
        run: cmake --build --preset debug

      - name: Test
        run: ctest --preset debug

      - name: Build (Release)
        run: cmake --build --preset release

      - name: Package Windows build
        shell: pwsh
        run: |
          $dist = "no-engine-game-win64"
          $src = "build/msvc-x64/bin/Release"
          New-Item -ItemType Directory -Force -Path $dist | Out-Null
          # Ship the game + headless tool + runtime DLLs + assets — not the unit-test exe.
          Copy-Item "$src/neg.exe","$src/neg_headless.exe" $dist -Force
          Copy-Item "$src/*.dll" $dist -Force
          Copy-Item "$src/assets" $dist -Recurse -Force
          Compress-Archive -Path $dist -DestinationPath "$dist.zip" -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: no-engine-game-win64
          path: no-engine-game-win64.zip

      - name: Publish release (on version tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: no-engine-game-win64.zip
