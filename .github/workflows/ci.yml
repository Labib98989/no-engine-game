name: CI

on:
  push:
    branches: [master]
    tags: ["v*"]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write # needed by the release job to upload the zip on a tag

# Cancel superseded runs on the same ref (e.g. rapid pushes).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      # Put cl.exe / the Windows SDK on PATH. This works regardless of which
      # Visual Studio version the runner ships (it currently has VS18, so the
      # local "Visual Studio 17 2022" preset generator isn't available here) —
      # CI builds with Ninja against the same vcpkg-provided dependencies.
      - name: Set up MSVC (x64)
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure (Ninja + vcpkg)
        shell: pwsh
        run: >
          cmake -S . -B build/ci -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          "-DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"
          -DVCPKG_TARGET_TRIPLET=x64-windows

      - name: Build
        run: cmake --build build/ci

      - name: Test
        run: ctest --test-dir build/ci --output-on-failure

      - name: Package Windows build
        shell: pwsh
        run: |
          $dist = "no-engine-game-win64"
          $src = "build/ci/bin/Release"
          New-Item -ItemType Directory -Force -Path $dist | Out-Null
          # Ship the game + headless tool + runtime DLLs + assets — not the unit-test exe.
          Copy-Item "$src/neg.exe","$src/neg_headless.exe" $dist -Force
          Copy-Item "$src/*.dll" $dist -Force
          Copy-Item "$src/assets" $dist -Recurse -Force
          Compress-Archive -Path $dist -DestinationPath "$dist.zip" -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: no-engine-game-win64
          path: no-engine-game-win64.zip

      - name: Publish release (on version tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: no-engine-game-win64.zip
